<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHOENIX ULTRA PRO | FIXED 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #ec4899;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.9);
            --text: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        .level-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .lvl-1 { background: var(--success); color: white; }
        .lvl-2 { background: var(--warning); color: black; }
        .lvl-3 { background: var(--danger); color: white; animation: blink 0.8s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        .predict-text { font-size: 50px; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .lucky-num { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 10px auto; font-size: 20px; font-weight: bold; }
        
        #status-msg { font-size: 12px; color: var(--warning); margin-top: 10px; }
        .history-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;"><i class="fas fa-fire"></i> PHOENIX <span style="color:var(--primary)">ULTRA</span></h2>

    <div class="glass-card">
        <div id="lvlBadge" class="level-badge lvl-1">LEVEL 1</div>
        <div style="font-size: 14px; opacity: 0.8;">PERIOD: <span id="periodText">----</span></div>
        <div class="predict-text" id="predictResult">ANALYZING...</div>
        <div>LUCKY NUMBER</div>
        <div class="lucky-num" id="luckyResult">?</div>
        <div id="status-msg">Connecting to AI Server...</div>
    </div>

    <div class="glass-card" style="padding: 10px;">
        <h4 style="margin: 10px;">RECENT RECOVERY HISTORY</h4>
        <div id="historyLog"></div>
    </div>
</div>

<script>
    // FIXED API URL with Proxy to avoid CORS issues
    const API_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=" + Date.now());
    
    let lastPeriod = "";
    let currentLevel = 1;
    let myPrediction = null;

    async function startSystem() {
        const msg = document.getElementById('status-msg');
        try {
            // Fetching data through Proxy
            const response = await fetch(API_URL);
            const rawData = await response.json();
            const data = JSON.parse(rawData.contents);
            
            const latest = data.data.list[0];
            const nextP = (parseInt(latest.issue) + 1).toString();

            if (nextP !== lastPeriod) {
                msg.innerText = "Data Synced. New Prediction Ready!";
                
                // Check WIN/LOSS
                if (myPrediction) {
                    const actualSize = parseInt(latest.number) <= 4 ? 'SMALL' : 'BIG';
                    updateHistory(latest.issue, latest.number, actualSize);
                    
                    if (myPrediction === actualSize) {
                        currentLevel = 1;
                    } else {
                        currentLevel = currentLevel >= 3 ? 1 : currentLevel + 1;
                    }
                }

                lastPeriod = nextP;
                generatePrediction(data.data.list, nextP);
            }
        } catch (error) {
            msg.innerText = "Error: Use Chrome or Refresh Page.";
            console.error(error);
        }
    }

    function generatePrediction(list, nextP) {
        const lastFive = list.slice(0, 5).map(i => parseInt(i.number) <= 4 ? 'S' : 'B');
        const bCount = lastFive.filter(x => x === 'B').length;
        
        let guess = "";
        let lucky = 0;

        // 2026 Level 3 Logic
        if (currentLevel === 3) {
            guess = lastFive[0] === 'B' ? 'SMALL' : 'BIG'; // Strong Reversal
            lucky = guess === 'BIG' ? 7 : 3;
        } else {
            guess = bCount >= 3 ? 'BIG' : 'SMALL'; // Trend Follow
            lucky = guess === 'BIG' ? 8 : 2;
        }

        // Update UI
        document.getElementById('periodText').innerText = nextP.slice(-4);
        document.getElementById('predictResult').innerText = guess;
        document.getElementById('luckyResult').innerText = lucky;
        
        const badge = document.getElementById('lvlBadge');
        badge.innerText = "LEVEL " + currentLevel;
        badge.className = "level-badge lvl-" + currentLevel;

        myPrediction = guess;
    }

    function updateHistory(issue, num, size) {
        const log = document.getElementById('historyLog');
        const isWin = myPrediction === size;
        const row = document.createElement('div');
        row.className = 'history-row';
        row.innerHTML = `
            <span>#${issue.slice(-3)}</span>
            <span>${num} (${size})</span>
            <span style="color:${isWin ? 'var(--success)' : 'var(--danger)'}">${isWin ? 'WIN' : 'LOSS'}</span>
        `;
        log.prepend(row);
        if (log.children.length > 5) log.lastChild.remove();
    }

    // Run every 5 seconds
    setInterval(startSystem, 5000);
    startSystem();
</script>

</body>
</html>
