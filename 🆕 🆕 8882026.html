<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Game with Trends</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-card { background: #1e1e1e; padding: 20px; border-radius: 20px; display: inline-block; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* AI Prediction Box */
        .ai-box { background: #333; padding: 10px; border-radius: 10px; margin: 15px 0; border: 1px dashed #007bff; }
        #ai-guess { font-weight: bold; color: #00d4ff; text-transform: uppercase; }

        .timer-box { font-size: 28px; color: #ffeb3b; margin: 10px 0; }
        .balance { font-size: 20px; color: #4caf50; margin-bottom: 15px; }
        
        /* Buttons */
        .btn-group button { width: 90px; height: 45px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin: 5px; font-size: 16px; }
        .green { background: #4CAF50; box-shadow: 0 4px #2e7d32; }
        .violet { background: #9C27B0; box-shadow: 0 4px #7b1fa2; }
        .red { background: #F44336; box-shadow: 0 4px #d32f2f; }
        .btn-group button:active { transform: translateY(2px); box-shadow: none; }
        
        /* Trend Table */
        .trend-section { margin-top: 25px; text-align: left; }
        table { width: 100%; border-collapse: collapse; background: #252525; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #333; color: #aaa; font-size: 12px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="balance">Wallet: ₹<span id="balance">1000</span></div>
    
    <div class="timer-box">Next Round: <span id="timer">30</span>s</div>

    <!-- AI Suggestion Area -->
    <div class="ai-box">
        🤖 AI Prediction: <span id="ai-guess">Wait for Next...</span>
    </div>

    <div id="log" style="height: 30px; margin-bottom: 10px; color: #bbb;">Select a color!</div>

    <div class="btn-group">
        <button id="bGreen" class="green" onclick="placeBet('Green')">Green</button>
        <button id="bViolet" class="violet" onclick="placeBet('Violet')">Violet</button>
        <button id="bRed" class="red" onclick="placeBet('Red')">Red</button>
    </div>

    <!-- Trend History Table -->
    <div class="trend-section">
        <h4 style="margin-left: 5px;">Trend History</h4>
        <table>
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Result</th>
                    <th>Color</th>
                </tr>
            </thead>
            <tbody id="trend-body">
                <!-- Rows will be added here via JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let balance = 1000;
    let timeLeft = 30;
    let selectedColour = null;
    let periodCount = 2024010101; // Fake Period ID
    let gameHistory = [];

    function startTimer() {
        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;

            if (timeLeft <= 5) {
                document.getElementById('log').innerText = "Betting Locked...";
                disableBtns(true);
            }

            if (timeLeft <= 0) {
                calculateResult();
                resetGame();
            }
        }, 1000);
    }

    function placeBet(col) {
        if (timeLeft <= 5) return;
        selectedColour = col;
        document.getElementById('log').innerText = "Bet Placed: " + col;
    }

    function calculateResult() {
        const colours = ['Green', 'Red', 'Green', 'Red', 'Violet', 'Red', 'Green'];
        const winCol = colours[Math.floor(Math.random() * colours.length)];
        
        // Win/Loss logic
        if (selectedColour === winCol) {
            balance += 20;
            document.getElementById('log').innerHTML = `<b style="color:#4caf50">WIN! (+₹20)</b>`;
        } else if (selectedColour != null) {
            balance -= 10;
            document.getElementById('log').innerHTML = `<b style="color:#f44336">LOST (-₹10)</b>`;
        } else {
            document.getElementById('log').innerText = "Result: " + winCol;
        }

        document.getElementById('balance').innerText = balance;
        
        // Update Trend
        updateTrendTable(periodCount, winCol);
        periodCount++;

        // Generate AI Prediction for next round
        generateAIPrediction(winCol);
    }

    function updateTrendTable(period, color) {
        const tbody = document.getElementById('trend-body');
        const colorHex = color === 'Green' ? '#4caf50' : (color === 'Red' ? '#f44336' : '#9c27b0');
        
        const row = `<tr>
            <td>${period}</td>
            <td style="color:${colorHex}">${color}</td>
            <td><span class="dot" style="background:${colorHex}"></span></td>
        </tr>`;
        
        tbody.insertAdjacentHTML('afterbegin', row);
        
        // Limit history to 5 rows
        if(tbody.rows.length > 5) tbody.deleteRow(5);
    }

    function generateAIPrediction(lastWin) {
        // Simple logic: If last was Red, suggest Green (Pattern flipping)
        const nextSuggest = (lastWin === 'Red') ? 'Green' : 'Red';
        const confidence = Math.floor(Math.random() * (99 - 60) + 60); // Fake confidence %
        document.getElementById('ai-guess').innerText = `${nextSuggest} (${confidence}%)`;
    }

    function resetGame() {
        timeLeft = 30;
        selectedColour = null;
        disableBtns(false);
    }

    function disableBtns(status) {
        const btns = ['bGreen', 'bViolet', 'bRed'];
        btns.forEach(id => document.getElementById(id).style.opacity = status ? "0.5" : "1");
    }

    startTimer();
</script>

</body>
</html>
