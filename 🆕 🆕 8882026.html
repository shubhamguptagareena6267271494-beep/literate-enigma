<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AK AI Predictor 2026 v3.5</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #080b12; color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .container {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT04uCksgmV2LBQkKVXAJJ4D3mSPrxOKUmaRouZFFZOi4cH_14MhDLP6Nw&s=10');
            background-size: cover; width: 100%; max-width: 400px; padding: 20px; position: relative; border: 2px solid #1e293b;
        }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid #00ff00; margin-bottom: 20px; }
        .card { background: rgba(15, 23, 42, 0.9); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; text-align: center; }
        .period-box { color: #38bdf8; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        .result-box { font-size: 2.5rem; font-weight: 800; color: #fbbf24; text-shadow: 0 0 15px rgba(251,191,36,0.4); margin: 15px 0; }
        .confidence-bar { background: #1e293b; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; border: 1px solid #475569; }
        .confidence-fill { background: linear-gradient(90deg, #ef4444, #22c55e); height: 100%; width: 0%; transition: 1.2s ease-in-out; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(30, 41, 59, 0.5); border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #3b82f6; }
        .win-badge { background: #166534; color: #4ade80; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .loss-badge { background: #991b1b; color: #f87171; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .timer { font-size: 1.2rem; color: #00ff00; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="font-size: 1.2rem; letter-spacing: 2px;">AK AI PREDICTOR V3.5</h1>
            <div class="timer" id="timer">00:60</div>
        </div>

        <div class="card">
            <div class="period-box" id="period-num">FETCHING PERIOD...</div>
            <div class="result-box" id="prediction-text">---</div>
            <div class="confidence-bar"><div class="confidence-fill" id="conf-fill"></div></div>
            <p id="pattern-text" style="font-size: 0.8rem; color: #94a3b8;">Analyzing Server Patterns...</p>
        </div>

        <div class="card" style="padding: 10px;">
            <div style="display: flex; justify-content: space-around; font-size: 0.8rem;">
                <span>Accuracy: <b id="acc-val" style="color:#00ff00">0%</b></span>
                <span>Total: <b id="total-val">0</b></span>
            </div>
        </div>

        <h3 style="margin-bottom: 10px; font-size: 0.9rem; color: #38bdf8;">HISTORY (REAL-TIME)</h3>
        <div id="history-list"></div>
    </div>

    <script>
        const config = {
            random: "40079dcba93a48769c6ee9d4d4fae23f",
            signature: "D12108C4F57C549D82B23A91E0FA20AE"
        };

        let stats = JSON.parse(localStorage.getItem('ak_stats')) || { wins: 0, total: 0 };

        async function updateData() {
            const ts = Math.floor(Date.now() / 1000);
            const body = { typeId: 1, language: 0, random: config.random, signature: config.signature, timestamp: ts };

            try {
                // Fetching both Period and Result History
                const [issueRes, historyRes] = await Promise.all([
                    fetch('https://api.bdg88zf.com/api/webapi/GetGameIssue', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) }),
                    fetch('https://api.bdg88zf.com/api/webapi/GetNoDataLine', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...body, pageSize: 10}) })
                ]);

                const issueData = await issueRes.json();
                const historyData = await historyRes.json();

                if (issueData.code === 0 && historyData.code === 0) {
                    const currentIssue = issueData.data.issueNumber;
                    const list = historyData.data.list;

                    document.getElementById('period-num').innerText = "PERIOD: " + currentIssue;
                    
                    // Predict Logic
                    const lastResult = list[0].number <= 4 ? 'SMALL' : 'BIG';
                    const prediction = (Math.random() > 0.5) ? 'BIG' : 'SMALL'; // Simplified 2026 logic
                    
                    document.getElementById('prediction-text').innerText = prediction;
                    document.getElementById('conf-fill').style.width = Math.floor(Math.random() * (95 - 75) + 75) + "%";
                    
                    // Show History & Win/Loss
                    renderHistory(list, currentIssue, prediction);
                }
            } catch (e) {
                console.log("API Connection Error");
            }
        }

        function renderHistory(list, currentIssue, currentPred) {
            const container = document.getElementById('history-list');
            container.innerHTML = "";
            
            list.forEach((item, index) => {
                const actualSize = item.number <= 4 ? 'SMALL' : 'BIG';
                const savedPred = localStorage.getItem('pred_' + item.issueNumber);
                
                let badge = "";
                if (savedPred) {
                    const win = savedPred === actualSize;
                    if (!localStorage.getItem('recorded_' + item.issueNumber)) {
                        stats.total++;
                        if (win) stats.wins++;
                        localStorage.setItem('ak_stats', JSON.stringify(stats));
                        localStorage.setItem('recorded_' + item.issueNumber, "true");
                    }
                    badge = win ? '<span class="win-badge">WIN</span>' : '<span class="loss-badge">LOSS</span>';
                }

                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span>#${item.issueNumber.slice(-3)}</span>
                    <span style="font-weight:bold; color:${item.number > 4 ? '#fbbf24' : '#38bdf8'}">${actualSize} (${item.number})</span>
                    ${badge}
                `;
                container.appendChild(div);
            });

            // Save current prediction for next round check
            localStorage.setItem('pred_' + currentIssue, currentPred);
            updateStatsUI();
        }

        function updateStatsUI() {
            const acc = stats.total === 0 ? 0 : ((stats.wins / stats.total) * 100).toFixed(1);
            document.getElementById('acc-val').innerText = acc + "%";
            document.getElementById('total-val').innerText = stats.total;
        }

        function startTimer() {
            setInterval(() => {
                const seconds = new Date().getSeconds();
                const rem = 60 - seconds;
                document.getElementById('timer').innerText = `00:${rem < 10 ? '0' : ''}${rem}`;
                if (rem === 59) updateData();
            }, 1000);
        }

        // Init
        updateData();
        startTimer();
    </script>
</body>
</html>
