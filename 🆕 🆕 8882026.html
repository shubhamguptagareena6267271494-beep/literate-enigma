<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction System</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:20px;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

#prediction{
    font-size:20px;
    margin-top:10px;
}

#status{
    font-size:22px;
    margin-top:10px;
    font-weight:bold;
}

#history{
    margin-top:20px;
    text-align:left;
    max-height:400px;
    overflow:auto;
}

.history-item{
    padding:6px;
    border-bottom:1px solid #333;
}
.win{
    color:lime;
}
.loss{
    color:red;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#22c55e;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <h2>Next Prediction</h2>
    <p id="prediction">Waiting...</p>
    <p id="status"></p>
    <button onclick="startPrediction()">Generate Prediction</button>
</div>

<div class="box">
    <h3>Last 20 History</h3>
    <div id="history"></div>
</div>

<script>

let historyData = [];
let lastPredictionData = null;

// Prediction Generate
function generatePrediction(){
    const number = Math.floor(Math.random()*10);
    const size = number >=5 ? "BIG" : "SMALL";

    lastPredictionData = {
        number:number,
        size:size
    };

    return number;
}

// Save History (max 20)
function saveToHistory(text, isWin){

    historyData.unshift({text, isWin});

    if(historyData.length > 20){
        historyData.pop();
    }

    const historyBox = document.getElementById("history");
    historyBox.innerHTML = "";

    historyData.forEach(item=>{
        const div = document.createElement("div");
        div.classList.add("history-item");
        div.classList.add(item.isWin ? "win" : "loss");
        div.innerHTML = item.text;
        historyBox.appendChild(div);
    });
}

// Start Prediction
function startPrediction(){

    const predictedNumber = generatePrediction();
    document.getElementById("prediction").innerHTML =
        "Predicted Number: " + predictedNumber;

    document.getElementById("status").innerHTML = "Waiting for result...";
    document.getElementById("status").style.color = "white";

    // ⬇️ Yahan apni API laga sakte ho
    // Example dummy result after 3 sec
    setTimeout(()=>{

        const actualNumber = Math.floor(Math.random()*10);

        let win = false;
        if(lastPredictionData.number === actualNumber){
            win = true;
        }

        let statusText = win ? "WIN 🤑" : "LOSS 😢";
        let statusColor = win ? "lime" : "red";

        document.getElementById("status").innerHTML = statusText;
        document.getElementById("status").style.color = statusColor;

        saveToHistory(
            `Pred: ${lastPredictionData.number} | Result: ${actualNumber} → ${statusText}`,
            win
        );

    },3000);
}

</script>

</body>
</html>
