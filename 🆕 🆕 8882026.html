<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Prediction & History</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #000;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00ff00; text-shadow: 0 0 10px #00ff00; font-size: 22px; }
        
        /* Prediction Card */
        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.1);
        }
        #period { font-size: 18px; color: cyan; margin-bottom: 10px; }
        #prediction { font-size: 28px; font-weight: bold; color: yellow; }

        /* History Table */
        .history-container {
            background: #111;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            border-bottom: 2px solid #00ff00;
            padding: 12px;
            font-size: 14px;
            color: #aaa;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }
        .win { color: #00ff00; font-weight: bold; }
        .loss { color: #ff4444; font-weight: bold; }
        .tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: #222;
        }
    </style>
</head>
<body>

    <h1>TanMayMods Prediction System</h1>

    <div class="card">
        <div id="period">Period: Fetching...</div>
        <div id="prediction">Wait for Next Period...</div>
    </div>

    <div class="history-container">
        <h3 style="margin: 0; color: #fff;">Last 20 Results History</h3>
        <table>
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Predict</th>
                    <th>Result</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <!-- Rows will be added here -->
            </tbody>
        </table>
    </div>

    <script>
        let predictionHistory = [];
        let currentPrediction = "";
        let lastPeriod = "";

        // Function to generate random prediction (Logic from your original script)
        function generatePrediction() {
            const sizes = ["BIG", "SMALL"];
            const colors = ["RED", "GREEN"];
            const size = sizes[Math.floor(Math.random() * sizes.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            return `${size} (${color})`;
        }

        // Table update karne ka function
        function updateHistory(period, predict, actual) {
            // Check if win or loss
            // Simple logic: Agar prediction ka pehla word (BIG/SMALL) result se match kare
            const isWin = predict.split(' ')[0] === actual;
            const statusText = isWin ? "WIN" : "LOSS";
            const statusClass = isWin ? "win" : "loss";

            // Add to array
            predictionHistory.unshift({
                period: period,
                predict: predict,
                actual: actual,
                status: statusText,
                class: statusClass
            });

            // Keep only last 20
            if (predictionHistory.length > 20) predictionHistory.pop();

            // Render Table
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = predictionHistory.map(row => `
                <tr>
                    <td>${row.period}</td>
                    <td><span class="tag">${row.predict}</span></td>
                    <td><span class="tag">${row.actual}</span></td>
                    <td class="${row.class}">${row.status}</td>
                </tr>
            `).join('');
        }

        // Main Loop (Har 5-10 second mein check karega)
        async function startSystem() {
            // Simulation logic (Kyuki real API access restricted ho sakta hai)
            setInterval(() => {
                const now = new Date();
                const periodId = now.getFullYear().toString() + (now.getMonth() + 1) + now.getDate() + now.getHours() + now.getMinutes();

                if (periodId !== lastPeriod) {
                    // Jab naya period aaye:
                    if (currentPrediction !== "") {
                        // Purane prediction ka result dikhao (Randomly simulating result BIG or SMALL)
                        const results = ["BIG", "SMALL"];
                        const actualResult = results[Math.floor(Math.random() * results.length)];
                        updateHistory(lastPeriod, currentPrediction, actualResult);
                    }

                    // Naya prediction generate karo
                    lastPeriod = periodId;
                    currentPrediction = generatePrediction();
                    
                    document.getElementById('period').innerText = "Period: " + periodId;
                    document.getElementById('prediction').innerText = currentPrediction;
                }
            }, 5000); // Har 5 second mein update check
        }

        // Start the process
        startSystem();
    </script>
</body>
</html>
